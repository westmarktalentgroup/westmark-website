name: Westmark Production Protection

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # NOTE: Direct pushes to main are blocked by GitHub branch protection (required PR, approval, status checks).
  # We do NOT run a job that fails on push to main here, because merging a PR also triggers a push event;
  # that would cause this workflow to fail on every successful merge. See DEPLOYMENT_SYSTEM_REVIEW.md.

  # VALIDATE PULL REQUESTS - Only allow proper workflow
  validate-pull-request:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Validate Pull Request
      run: |
        echo "✅ Pull Request Validation"
        echo "=========================="
        
        BRANCH_NAME="${{ github.head_ref }}"
        # Deploy branches (from ./scripts/deploy.sh) contain production output only; development/ is gitignored
        if [[ "$BRANCH_NAME" == deploy-* ]]; then
          echo "✅ Deploy branch - validating production files only"
          for f in index.html assets/css/optimized.css assets/js/consolidated.js; do
            if [[ ! -f "$f" ]]; then
              echo "🚨 CRITICAL: Production file missing: $f"
              exit 1
            fi
          done
          echo "✅ Pull request validation passed (deploy branch)"
          exit 0
        fi
        
        # Non-deploy branches: require development/ and its files
        if [[ ! -d "development" ]]; then
          echo "🚨 CRITICAL: Development directory missing"
          echo "❌ Pull request blocked"
          exit 1
        fi
        
        REQUIRED_FILES=(
          "development/index.html"
          "development/assets/css/optimized.css"
          "development/assets/js/consolidated.js"
        )
        
        for file in "${REQUIRED_FILES[@]}"; do
          if [[ ! -f "$file" ]]; then
            echo "🚨 CRITICAL: Required file missing: $file"
            echo "❌ Pull request blocked"
            exit 1
          fi
        done
        
        echo "✅ All required files present"
        echo "✅ Pull request validation passed"
        
    - name: Check for Direct Production Modifications
      run: |
        echo "🔍 Checking for direct production modifications..."
        
        # Deploy branches (from ./scripts/deploy.sh) are allowed to update production
        BRANCH_NAME="${{ github.head_ref }}"
        if [[ "$BRANCH_NAME" == deploy-* ]]; then
          echo "✅ Deploy branch detected - production updates from development/ are allowed"
          exit 0
        fi
        
        # Non-deploy branches: block direct production file changes
        PRODUCTION_FILES=(
          "index.html"
          "clients.html"
          "contact-us.html"
          "assets/css/optimized.css"
          "assets/js/consolidated.js"
        )
        
        for file in "${PRODUCTION_FILES[@]}"; do
          if git diff --name-only HEAD~1 | grep -q "^$file$"; then
            echo "🚨 CRITICAL: Direct production file modification detected: $file"
            echo "❌ All changes must be made in development/ directory"
            echo "❌ Use ./scripts/deploy.sh to create a deploy branch"
            exit 1
          fi
        done
        
        echo "✅ No direct production modifications detected"
        
    - name: Validate Documentation
      run: |
        echo "📋 Validating documentation..."
        
        # Check if documentation files exist
        DOC_FILES=(
          "docs/AI_CIRCUMVENTION_PROTECTION.md"
          "docs/COMPONENT_LIBRARY.md"
          "docs/CSS_STANDARDS.md"
          "docs/TECHNICAL_ARCHITECTURE.md"
        )
        
        for file in "${DOC_FILES[@]}"; do
          if [[ ! -f "$file" ]]; then
            echo "🚨 CRITICAL: Required documentation missing: $file"
            echo "❌ Pull request blocked"
            exit 1
          fi
        done
        
        echo "✅ All required documentation present"
        
    - name: Security Check
      run: |
        echo "🔐 Running security checks..."
        
        # Check for suspicious patterns in commit messages
        if git log -1 --pretty=%B | grep -iE "(bypass|circumvent|force|override|skip|disable)" >/dev/null; then
          echo "🚨 CRITICAL: Suspicious commit message detected"
          echo "❌ Pull request blocked for security"
          exit 1
        fi
        
        echo "✅ Security checks passed"
        
    # Deployment to GitHub Pages is handled by deploy.yml on push to main (triggered when PR is merged).
    # This workflow only validates PRs; it does not deploy. See DEPLOYMENT_SYSTEM_REVIEW.md.
